<!doctype html>
<html lang="ko">

    <div class="popup-root" style="height: 100vh; display: flex; align-items: center; justify-content: center; gap: 50px">
      <div class="popup popup--search">
        <div class="popup__header">
          <button class="popup__btn popup__btn--close" type="button" aria-label="팝업 끄기">

          </button>
        </div>

            </div>
            <button class="popup__btn popup__btn--search" type="button" aria-label="검색하기">
              <span class="icon icon--search" aria-hidden="true"></span>
            </button>
          </div>
          <div class="popup__recent">
            <p class="popup__title">최근 검색어</p>
            <div class="popup__search-history">
              <ul class="popup__search-history-list">

                    <span class="icon" aria-hidden="true"></span>
                  </button>
                </li>
              </ul>
            </div>
          </div>
        </div>
        <div class="popup__footer">
          <div class="popup__btns">
            <button class="popup__btn" type="button">전체 삭제</button>
            <button class="popup__btn" type="button">자동저장 끄기</button>
